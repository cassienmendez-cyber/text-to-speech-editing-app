name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Build
        run: npm run build
        env:
          # Served from https://<user>.github.io/<repo>/
          BASE_PATH: /${{ github.event.repository.name }}/
          # Optional collaboration config (set as repository variables):
          #   Settings → Secrets and variables → Actions → Variables
          VITE_SIGNALING: ${{ vars.VITE_SIGNALING }}
          VITE_ICE_SERVERS: ${{ vars.VITE_ICE_SERVERS }}
      - run: touch dist/.nojekyll
      - uses: actions/configure-pages@v5
        with:
          # Auto-create/enable the Pages site (no manual Settings → Pages step).
          # Requires Pages to be available for the repo (public repo, or a paid
          # plan for private repos).
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
